<h3>Add Task</h3>

<form [formGroup]="form" (ngSubmit)="submit()">

  <input
    type="text"
    formControlName="title"
    placeholder="Title"
  >

  <input
    type="text"
    formControlName="description"
    placeholder="Description"
  >

  <select formControlName="status">

    <option value="OPEN">
      OPEN
    </option>

    <option value="IN_PROGRESS">
      IN PROGRESS
    </option>

    <option value="COMPLETED">
      COMPLETED
    </option>

  </select>

  <button type="submit">
    Add Task
  </button>

</form>
