<h2>Signup</h2>

<form [formGroup]="form" (ngSubmit)="submit()">

  <input
    type="text"
    formControlName="username"
    placeholder="Username"
  >

  <input
    type="email"
    formControlName="email"
    placeholder="Email"
  >

  <input
    type="password"
    formControlName="password"
    placeholder="Password"
  >

  <button type="submit">
    Signup
  </button>

</form>
